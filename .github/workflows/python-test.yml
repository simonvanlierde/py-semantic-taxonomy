---
# This workflow will install Python dependencies and run tests
# across operating systems, select versions of Python, and user + dev environments
# For more info see:
# https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python 🐍 CI/CD tests

on:
  push:
    branches: [main]
    paths-ignore:  # prevents workflow execution when only these types of files are modified
      - "**.md"  # wildcards prevent file in any repo dir from trigering workflow
      - "**.bib"
      - "**.ya?ml"  # captures both .yml and .yaml
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]  # synchronize covers new commits and force-pushes (e.g. after rebase)
    paths-ignore:
      - "**.md"
      - "**.bib"
      - "**.ya?ml"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:  # also allow manual trigger, for testing purposes

jobs:
  testing:
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: true
      matrix:
        py-version: ["3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.py-version }}

      - name: Install package and test deps
        run: |
          uv sync --only-group testing

      - name: Test with pytest
        # Should be:
        # pytest -m "postgres or not postgres"
        # But there's some issue with connections closing on Github
        run: |
          pytest -vv
